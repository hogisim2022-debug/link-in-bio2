<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .wrap { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .field { position: relative; background: #fff; border: 1px solid #d6dbde; border-radius: 4px; padding: 18px 12px 10px; }
  .field.is-focus { border-color: #00754A; }
  .field.is-valid { background: hsl(160 32% 92%); }
  .field.is-invalid { background: hsl(4 82% 43% / 0.05); border-color: #c82014; }
  .lbl { position:absolute; top: 6px; left: 12px; font-size: 11px; color: var(--sb-text-black-soft); font-weight: 600; letter-spacing: 0.02em; }
  .val { font-size: 15px; color: var(--sb-text-black); }
  .caption { font-size: 11px; color: var(--sb-text-black-soft); margin-top: 6px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="field"><div class="lbl">Email</div><div class="val">barista@starbucks</div></div>
    <div class="caption">Default</div>
  </div>
  <div>
    <div class="field is-valid"><div class="lbl" style="color:#00754A;">Email</div><div class="val">hello@starbucks.com</div></div>
    <div class="caption">Valid</div>
  </div>
  <div>
    <div class="field is-invalid"><div class="lbl" style="color:#c82014;">Email</div><div class="val">hello@star.</div></div>
    <div class="caption">Invalid</div>
  </div>
</div>
</body>
</html>
