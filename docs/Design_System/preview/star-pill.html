<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rewards Star Pill</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: #1E3932; font-family: var(--sb-font-primary); color: #fff; letter-spacing: var(--sb-tracking-normal); display:flex; align-items:center; gap:16px; }
  .pill { display:inline-flex; align-items:center; gap:4px; padding: 4px 12px; border: 1px solid #cba258; color: #cba258; border-radius: 50px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; background: transparent; }
  .pill-light { border-color: #cba258; color: #cba258; background: #fff; }
  .caption { font-size: 12px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
  <span class="pill">200★ item</span>
  <span class="pill">150★ item</span>
  <span class="pill pill-light" style="color:#1E3932; border-color:#cba258;">450★ item</span>
  <span class="caption">Reserved for Rewards-redeemable products.</span>
</body>
</html>
