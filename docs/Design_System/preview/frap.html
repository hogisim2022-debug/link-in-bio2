<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frap Floating CTA</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .scene { position: relative; height: 200px; background: #fff; border-radius: 12px; box-shadow: var(--sb-shadow-card); overflow: hidden; }
  .frap { position: absolute; right: 16px; bottom: 16px; width: 56px; height: 56px; border-radius: 50%; background: #00754A; color:#fff; border:0; display:inline-flex; align-items:center; justify-content:center; box-shadow: 0 0 6px rgba(0,0,0,0.24), 0 8px 12px rgba(0,0,0,0.14); }
  .frap-mini { position: absolute; right: 88px; bottom: 24px; width: 40px; height: 40px; border-radius: 50%; background: #00754A; color:#fff; display:inline-flex; align-items:center; justify-content:center; box-shadow: 0 0 6px rgba(0,0,0,0.24), 0 8px 12px rgba(0,0,0,0.14); }
  .caption { position:absolute; left:16px; top:16px; font-size:12px; color: var(--sb-text-black-soft); }
  .spec { font-size: 11px; color: var(--sb-text-black-soft); margin-top:8px; font-variant-numeric: tabular-nums; }
  .icon { width: 24px; height: 24px; }
</style>
</head>
<body>
<div class="scene">
  <div class="caption">Scrolled content surface ↓</div>
  <div class="frap-mini"><i data-lucide="shopping-bag" class="icon" style="width:18px;height:18px;"></i></div>
  <button class="frap"><i data-lucide="shopping-bag" class="icon"></i></button>
</div>
<div class="spec">Primary 56 px · Mini 40 px · Green Accent fill · 2-layer shadow</div>
<script>lucide.createIcons();</script>
</body>
</html>
