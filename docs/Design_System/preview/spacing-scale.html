<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .row { display: grid; grid-template-columns: 90px 1fr 70px; align-items: center; gap: 14px; padding: 6px 0; }
  .tok { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .bar { height: 14px; background: #00754A; border-radius: 3px; }
  .px  { font-size: 11px; color: var(--sb-text-black-soft); text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row"><div class="tok">--space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="tok">--space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="tok">--space-3</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 px ★</div></div>
  <div class="row"><div class="tok">--space-4</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 px</div></div>
  <div class="row"><div class="tok">--space-5</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="tok">--space-6</div><div><div class="bar" style="width:40px"></div></div><div class="px">40 px</div></div>
  <div class="row"><div class="tok">--space-7</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 px</div></div>
  <div class="row"><div class="tok">--space-8</div><div><div class="bar" style="width:56px"></div></div><div class="px">56 px</div></div>
  <div class="row"><div class="tok">--space-9</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 px</div></div>
</body>
</html>
