<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rewards Gold</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); }
  .wrap { display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .sw { border-radius: 12px; overflow: hidden; background: var(--sb-white); box-shadow: var(--sb-shadow-card); }
  .chip { height: 80px; }
  .meta { padding: 12px 14px 14px; }
  .name { font-size: 13px; font-weight: 600; color: var(--sb-text-black); }
  .hex  { font-size: 12px; color: var(--sb-text-black-soft); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .role { font-size: 11px; color: var(--sb-text-black-soft); margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#cba258"></div><div class="meta"><div class="name">Gold</div><div class="hex">#cba258</div><div class="role">Rewards status only — never a general accent</div></div></div>
  <div class="sw"><div class="chip" style="background:#dfc49d"></div><div class="meta"><div class="name">Gold Light</div><div class="hex">#dfc49d</div><div class="role">Gold-tier background wash</div></div></div>
  <div class="sw"><div class="chip" style="background:#faf6ee"></div><div class="meta"><div class="name">Gold Lightest</div><div class="hex">#faf6ee</div><div class="role">Partnership band cream-gold</div></div></div>
</div>
</body>
</html>
