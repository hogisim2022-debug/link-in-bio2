<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); display:flex; align-items:center; gap:32px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .disc { width:96px; height:96px; border-radius:50%; background:#006241; }
  .lbl { font-size: 11px; color: var(--sb-text-black-soft); }
  .word { font-weight: 700; font-size: 28px; color:#006241; letter-spacing:-0.5px; font-family: var(--sb-font-primary); }
</style>
</head>
<body>
  <div class="cell">
    <img src="../assets/logos/starbucks-siren.svg" width="96" height="96">
    <div class="lbl">Siren disc — Starbucks Green</div>
  </div>
  <div class="cell">
    <div class="word">STARBUCKS</div>
    <div class="lbl">Wordmark — top-nav</div>
  </div>
</body>
</html>
