<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feature Band</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: #1E3932; font-family: var(--sb-font-primary); color: #fff; letter-spacing: var(--sb-tracking-normal); }
  .band { display:grid; grid-template-columns: 3fr 2fr; gap: 24px; padding: 36px 36px; align-items: center; min-height: 240px; }
  h2 { font-size: 34px; font-weight: 700; line-height: 1.1; letter-spacing: -0.5px; margin:0 0 14px; color: #ffffff; }
  p { font-size: 15px; color: rgba(255,255,255,0.80); margin: 0 0 20px; line-height: 1.5; max-width: 340px; }
  .row { display:flex; gap:10px; }
  .img { background: radial-gradient(circle at 30% 30%, #d4e9e2 0%, #2b5148 70%); border-radius: 12px; aspect-ratio: 4/3; display:flex; align-items:center; justify-content:center; font-family:'Lora',serif; font-style: italic; color: rgba(255,255,255,0.85); font-size: 18px; }
</style>
</head>
<body>
<div class="band">
  <div>
    <h2>Free coffee is just the beginning.</h2>
    <p>Join Starbucks Rewards to earn Stars for free food and drinks, order ahead, and more.</p>
    <div class="row">
      <button class="sb-btn sb-btn--on-dark-filled">Join now</button>
      <button class="sb-btn sb-btn--on-dark-outline">Learn more</button>
    </div>
  </div>
  <div class="img">product photograph</div>
</div>
</body>
</html>
