<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Green Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); }
  .wrap { display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 12px; overflow: hidden; background: var(--sb-white); box-shadow: var(--sb-shadow-card); }
  .chip { height: 64px; }
  .meta { padding: 10px 12px 12px; }
  .name { font-size: 12px; font-weight: 600; color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .hex  { font-size: 11px; color: var(--sb-text-black-soft); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .role { font-size: 10px; color: var(--sb-text-black-soft); margin-top: 4px; line-height: 1.35; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#006241"></div><div class="meta"><div class="name">Starbucks Green</div><div class="hex">#006241</div><div class="role">H1, brand moments</div></div></div>
  <div class="sw"><div class="chip" style="background:#00754A"></div><div class="meta"><div class="name">Green Accent</div><div class="hex">#00754A</div><div class="role">Primary CTA, Frap</div></div></div>
  <div class="sw"><div class="chip" style="background:#1E3932"></div><div class="meta"><div class="name">House Green</div><div class="hex">#1E3932</div><div class="role">Feature bands, footer</div></div></div>
  <div class="sw"><div class="chip" style="background:#2b5148"></div><div class="meta"><div class="name">Green Uplift</div><div class="hex">#2b5148</div><div class="role">Decorative accent</div></div></div>
  <div class="sw"><div class="chip" style="background:#d4e9e2"></div><div class="meta"><div class="name">Green Light</div><div class="hex">#d4e9e2</div><div class="role">Valid-field wash</div></div></div>
</div>
</body>
</html>
