<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); letter-spacing: var(--sb-tracking-normal); }
  .wrap { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border-radius: 12px; padding: 18px 20px; box-shadow: var(--sb-shadow-card); }
  .light { background: #ffffff; }
  .dark  { background: #1E3932; }
  .row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .txt { font-size: 15px; font-weight: 600; }
  .meta { font-size: 11px; margin-left: auto; font-variant-numeric: tabular-nums; opacity: 0.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card light">
    <div class="row"><span class="dot" style="background:rgba(0,0,0,0.87)"></span><span class="txt" style="color:rgba(0,0,0,0.87)">Text Black — heading & body</span><span class="meta" style="color:rgba(0,0,0,0.58)">rgba 87%</span></div>
    <div class="row"><span class="dot" style="background:rgba(0,0,0,0.58)"></span><span class="txt" style="color:rgba(0,0,0,0.58)">Text Black Soft — metadata</span><span class="meta" style="color:rgba(0,0,0,0.58)">rgba 58%</span></div>
    <div class="row"><span class="dot" style="background:#33433d"></span><span class="txt" style="color:#33433d">Rewards Green — Rewards body</span><span class="meta" style="color:rgba(0,0,0,0.58)">#33433d</span></div>
  </div>
  <div class="card dark">
    <div class="row"><span class="dot" style="background:#ffffff"></span><span class="txt" style="color:#ffffff">Text White — heading & body</span><span class="meta" style="color:rgba(255,255,255,0.7)">100%</span></div>
    <div class="row"><span class="dot" style="background:rgba(255,255,255,0.70)"></span><span class="txt" style="color:rgba(255,255,255,0.70)">Text White Soft — secondary</span><span class="meta" style="color:rgba(255,255,255,0.7)">rgba 70%</span></div>
    <div class="row"><span class="dot" style="background:#cba258"></span><span class="txt" style="color:#cba258">Gold — Rewards accent on dark</span><span class="meta" style="color:rgba(255,255,255,0.7)">#cba258</span></div>
  </div>
</div>
</body>
</html>
