<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons — Dark Band</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: #1E3932; font-family: var(--sb-font-primary); color: var(--sb-white); letter-spacing: var(--sb-tracking-normal); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .label { font-size: 10px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">On dark-green feature band</div>
  <div class="row">
    <button class="sb-btn sb-btn--on-dark-filled">See the spring menu</button>
    <button class="sb-btn sb-btn--on-dark-outline">Learn more</button>
  </div>
</body>
</html>
