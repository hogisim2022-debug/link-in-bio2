<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .wrap { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .ico { width: 48px; height: 48px; border-radius: 12px; background: #fff; box-shadow: var(--sb-shadow-card); display:inline-flex; align-items:center; justify-content:center; color: #1E3932; }
  .ico svg { width: 22px; height: 22px; stroke-width: 2; }
  .lbl { font-size: 10px; color: var(--sb-text-black-soft); }
  .star { color: #cba258; font-size: 22px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell"><div class="ico"><i data-lucide="home"></i></div><div class="lbl">home</div></div>
  <div class="cell"><div class="ico"><i data-lucide="credit-card"></i></div><div class="lbl">pay</div></div>
  <div class="cell"><div class="ico"><i data-lucide="shopping-bag"></i></div><div class="lbl">order</div></div>
  <div class="cell"><div class="ico"><i data-lucide="gift"></i></div><div class="lbl">gift</div></div>
  <div class="cell"><div class="ico"><i data-lucide="bell"></i></div><div class="lbl">bell</div></div>
  <div class="cell"><div class="ico"><i data-lucide="ticket"></i></div><div class="lbl">coupon</div></div>
  <div class="cell"><div class="ico"><i data-lucide="map-pin"></i></div><div class="lbl">store</div></div>
  <div class="cell"><div class="ico"><span class="star">★</span></div><div class="lbl">stars</div></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
