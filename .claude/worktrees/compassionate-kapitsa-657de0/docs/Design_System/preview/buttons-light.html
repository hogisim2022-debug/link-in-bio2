<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons — Light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .row + .row { margin-top: 14px; }
  .label { font-size: 10px; color: var(--sb-text-black-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="label">On light surfaces</div>
  <div class="row">
    <button class="sb-btn sb-btn--primary">Explore our menu</button>
    <button class="sb-btn sb-btn--outline">Start an order</button>
    <button class="sb-btn sb-btn--black">Join now</button>
    <button class="sb-btn sb-btn--dark-outline">Sign in</button>
  </div>
</body>
</html>
