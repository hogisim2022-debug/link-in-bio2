<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .wrap { display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .shape { width: 88px; height: 64px; background: #006241; }
  .pill { border-radius: 50px; }
  .name { font-size: 12px; font-weight: 600; }
  .spec { font-size: 11px; color: var(--sb-text-black-soft); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell"><div class="shape" style="border-radius:4px;"></div><div class="name">Input</div><div class="spec">4 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:12px;"></div><div class="name">Card / Modal</div><div class="spec">12 px</div></div>
  <div class="cell"><div class="shape pill" style="width:120px; height:36px;"></div><div class="name">Button Pill</div><div class="spec">50 px</div></div>
  <div class="cell"><div class="shape" style="width:64px; height:64px; border-radius:50%;"></div><div class="name">Frap / Avatar</div><div class="spec">50%</div></div>
</div>
</body>
</html>
