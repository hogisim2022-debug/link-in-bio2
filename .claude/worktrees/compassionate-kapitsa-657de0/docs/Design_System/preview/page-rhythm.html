<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Rhythm</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background: var(--sb-neutral-warm); font-family: var(--sb-font-primary); color: var(--sb-text-black); letter-spacing: var(--sb-tracking-normal); }
  .row { display:flex; flex-direction:column; width: 100%; height: 300px; }
  .seg { display:flex; align-items:center; padding: 0 18px; font-size: 11px; font-weight:600; }
  .s1 { background: #f2f0eb; color: var(--sb-text-black); flex:2; }
  .s2 { background: #ffffff; color: var(--sb-text-black); flex:2; box-shadow: inset 0 1px 0 rgba(0,0,0,0.04); }
  .s3 { background: #1E3932; color: #fff; flex:3; }
  .s4 { background: #edebe9; color: var(--sb-text-black); flex:1; }
  .s5 { background: #1E3932; color: #cba258; flex:2; }
</style>
</head>
<body>
<div class="row">
  <div class="seg s1">CREAM HERO · #f2f0eb</div>
  <div class="seg s2">WHITE CONTENT · #ffffff</div>
  <div class="seg s3">HOUSE GREEN FEATURE BAND · #1E3932</div>
  <div class="seg s4">CERAMIC UTILITY · #edebe9</div>
  <div class="seg s5">HOUSE GREEN FOOTER · gold accents</div>
</div>
</body>
</html>
